name: ETL

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      source:
        description: 'Specific source to run (empty = all)'
        required: false
        default: ''

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      sources: ${{ steps.gen.outputs.sources }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install PyYAML
      - id: gen
        run: |
          SOURCES=$(python -c "
          import yaml, json
          with open('sources.yml') as f:
              sources = yaml.safe_load(f)['sources']
          print(json.dumps([s['id'] for s in sources]))
          ")
          echo "sources=$SOURCES" >> $GITHUB_OUTPUT

  etl:
    needs: matrix
    strategy:
      fail-fast: false
      matrix:
        source: ${{ fromJson(needs.matrix.outputs.sources) }}
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.source == '' || github.event.inputs.source == matrix.source }}
    concurrency:
      group: etl-${{ matrix.source }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ -v
      - run: python -m etl.main --source ${{ matrix.source }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
