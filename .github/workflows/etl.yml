name: ETL

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      source:
        description: 'Specific source to run (empty = all)'
        required: false
        default: ''

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      sources: ${{ steps.gen.outputs.sources }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install PyYAML
      - id: gen
        env:
          REQUESTED_SOURCE: ${{ inputs.source }}
        run: |
          SOURCES=$(python -c "
          import yaml, json, os
          with open('sources.yml') as f:
              sources = yaml.safe_load(f)['sources']
          requested = os.environ.get('REQUESTED_SOURCE', '')
          if requested:
              sources = [s for s in sources if s['id'] == requested]
          print(json.dumps([s['id'] for s in sources]))
          ")
          echo "sources=$SOURCES" >> $GITHUB_OUTPUT

  # Integration tests require supabase start (local Supabase). Run locally:
  #   python -m pytest tests/ -v

  etl:
    needs: [matrix]
    strategy:
      fail-fast: false
      matrix:
        source: ${{ fromJson(needs.matrix.outputs.sources) }}
    runs-on: ubuntu-latest
    # cancel-in-progress: false so runs queue rather than abort on */10 cron ticks
    concurrency:
      group: etl-${{ matrix.source }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m etl.main --source ${{ matrix.source }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

  consolidator:
    needs: [matrix, etl]
    if: ${{ success() || failure() }}
    runs-on: ubuntu-latest
    concurrency:
      group: etl-consolidator
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m etl.export
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
